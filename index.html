<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodTunes - Your Mood, Your Music</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <h1>MoodTunes</h1>
        <p>Your Mood, Your Music</p>
      </div>
      <button class="profile-btn" id="profileBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
    </header>

    <main class="main-content">
      <section class="mood-detection-section glass-card">
        <h2>How are you feeling?</h2>

        <div class="upload-area" id="uploadArea">
          <div class="upload-content" id="uploadContent">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Upload your photo</p>
            <span>Click or drag to upload</span>
          </div>
          <img id="uploadedImage" class="uploaded-preview" alt="Uploaded" style="display: none;">
          <button class="remove-image-btn" id="removeImageBtn" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <button class="webcam-btn" id="webcamBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          Use Webcam
        </button>

        <div class="mood-selector">
          <h3>Or select your mood manually</h3>
          <div class="mood-pills" id="moodPills"></div>
        </div>

        <button class="detect-btn" id="detectBtn" disabled>
          <span class="btn-text">Analyze Mood</span>
          <span class="btn-loader" style="display: none;"></span>
        </button>
      </section>

      <section class="detected-mood-section" id="detectedMoodSection" style="display: none;">
        <div class="glass-card mood-result">
          <div class="mood-icon" id="moodIcon"></div>
          <h3>Your mood: <span id="moodName"></span></h3>
          <p id="moodDescription"></p>
        </div>
      </section>

      <section class="music-recommendations" id="musicSection" style="display: none;">
        <h2>Songs for your mood</h2>
        <div class="loading-skeleton" id="loadingSkeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
        <div class="songs-grid" id="songsGrid"></div>
      </section>

      <section class="recent-moods-section glass-card" id="recentMoodsSection" style="display: none;">
        <h3>Recent Moods</h3>
        <div class="recent-moods-list" id="recentMoodsList"></div>
      </section>
    </main>

    <div class="music-player" id="musicPlayer" style="display: none;">
      <div class="player-progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="player-content">
        <div class="album-art" id="playerAlbumArt">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="10 8 16 12 10 16 10 8"></polygon>
          </svg>
        </div>
        <div class="player-info">
          <div class="player-title" id="playerTitle">No song playing</div>
          <div class="player-artist" id="playerArtist">Select a song</div>
        </div>
        <div class="player-controls">
          <button class="control-btn" id="prevBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="19 20 9 12 19 4 19 20"></polygon>
              <line x1="5" y1="19" x2="5" y2="5"></line>
            </svg>
          </button>
          <button class="control-btn play-btn" id="playBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </button>
          <button class="control-btn" id="nextBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 4 15 12 5 20 5 4"></polygon>
              <line x1="19" y1="5" x2="19" y2="19"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="webcamModal" style="display: none;">
      <div class="modal glass-card">
        <button class="modal-close" id="closeWebcamModal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <h3>Capture Your Mood</h3>
        <div class="webcam-container">
          <video id="webcamVideo" autoplay playsinline></video>
          <canvas id="webcamCanvas" style="display: none;"></canvas>
        </div>
        <div class="modal-actions">
          <button class="secondary-btn" id="cancelWebcam">Cancel</button>
          <button class="primary-btn" id="captureBtn">Capture Photo</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="profileModal" style="display: none;">
      <div class="modal glass-card profile-modal">
        <button class="modal-close" id="closeProfileModal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <h3>Your Profile</h3>
        <div class="profile-content">
          <div class="stat-card">
            <div class="stat-value" id="totalSongs">0</div>
            <div class="stat-label">Songs Played</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalMoods">0</div>
            <div class="stat-label">Moods Detected</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer"></audio>

  <script type="module" src="app.js"></script>
</body>
</html>
